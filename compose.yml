services:
  postgres:
    image: postgis/postgis:alpine
    build:
      context: https://github.com/postgis/docker-postgis.git#master:18-3.6
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - data:/var/lib/postgresql

volumes:
  data:
